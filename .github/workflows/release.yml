name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Create release for tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists."
          else
            gh release create "$TAG_NAME" \
              --repo "$GH_REPO" \
              --title "$TAG_NAME" \
              --generate-notes
          fi

  package:
    name: Package ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    needs: create-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            package_dir: taskier-win32-x64
            asset_name: taskier-win32-x64.zip
          - os: ubuntu-latest
            platform: linux
            arch: x64
            package_dir: taskier-linux-x64
            asset_name: taskier-linux-x64.zip
          - os: macos-latest
            platform: darwin
            arch: x64
            package_dir: taskier-darwin-x64
            asset_name: taskier-darwin-x64.zip
          - os: macos-latest
            platform: darwin
            arch: arm64
            package_dir: taskier-darwin-arm64
            asset_name: taskier-darwin-arm64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Electron app
        run: npm run package -- --platform=${{ matrix.platform }} --arch=${{ matrix.arch }}

      - name: Create release zip on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = Join-Path "out" "${{ matrix.package_dir }}"
          $assetPath = Join-Path "dist" "${{ matrix.asset_name }}"

          if (!(Test-Path $packageDir)) {
            throw "Packaged app directory was not found: $packageDir"
          }

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Compress-Archive -Path (Join-Path $packageDir "*") -DestinationPath $assetPath -Force

      - name: Create release zip on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="out/${{ matrix.package_dir }}"
          asset_path="dist/${{ matrix.asset_name }}"

          if [ ! -d "$package_dir" ]; then
            echo "Packaged app directory was not found: $package_dir" >&2
            exit 1
          fi

          mkdir -p dist
          (cd out && zip -r "../$asset_path" "${{ matrix.package_dir }}")

      - name: Create release zip on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="out/${{ matrix.package_dir }}"
          asset_path="dist/${{ matrix.asset_name }}"

          if [ ! -d "$package_dir" ]; then
            echo "Packaged app directory was not found: $package_dir" >&2
            exit 1
          fi

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$package_dir" "$asset_path"

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
